<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080808">
<meta name="description" content="a private archive. enter your key.">
<title>memories with the ones who matter.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root{
  --bg:#080808;
  --surface:rgba(255,255,255,0.045);
  --surface-hi:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.07);
  --border-hi:rgba(255,255,255,0.14);
  --text:#e2e2e2;
  --text-soft:#aaa;
  --muted:#444;
  --muted-2:#383838;
  --muted-3:#252525;
  --accent:#a78bfa;
  --accent-dim:rgba(167,139,250,0.15);
  --accent-glow:rgba(167,139,250,0.35);
  --error:#f87171;
  --lock-gold:#fbbf24;
  --radius:16px;
  --radius-sm:10px;
  --ease:cubic-bezier(0.22,1,0.36,1);
  --ease-back:cubic-bezier(0.34,1.56,0.64,1);
}

/* Per-person accent overrides (set on body via JS) */
body[data-accent="violet"]   { --accent:#a78bfa; --accent-dim:rgba(167,139,250,0.15); --accent-glow:rgba(167,139,250,0.35); }
body[data-accent="rose"]     { --accent:#fb7185; --accent-dim:rgba(251,113,133,0.15); --accent-glow:rgba(251,113,133,0.35); }
body[data-accent="emerald"]  { --accent:#34d399; --accent-dim:rgba(52,211,153,0.15); --accent-glow:rgba(52,211,153,0.35); }
body[data-accent="amber"]    { --accent:#fbbf24; --accent-dim:rgba(251,191,36,0.15); --accent-glow:rgba(251,191,36,0.35); }

/* ============================================================
   RESET / BASE
   ============================================================ */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-size:15px;
  line-height:1.8;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overflow-x:hidden;
  min-height:100dvh;
  position:relative;
}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif;font-weight:700;letter-spacing:-0.01em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}
::selection{background:var(--accent-dim);color:var(--text)}

/* Ambient gradient wash behind everything */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(800px 600px at 15% 0%, rgba(167,139,250,0.06), transparent 60%),
    radial-gradient(700px 500px at 85% 100%, rgba(167,139,250,0.04), transparent 60%);
  pointer-events:none;
  z-index:0;
  transition:opacity 600ms ease;
}

/* Subtle grain over everything */
body::after{
  content:'';
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  opacity:0.028;
  pointer-events:none;
  z-index:9999;
  mix-blend-mode:overlay;
}

/* Custom scrollbar */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e1e1e;border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:#2a2a2a}
*{scrollbar-width:thin;scrollbar-color:#1e1e1e transparent}

/* Ambient particle canvas — lock screen only, extremely subtle */
#ambient-canvas{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
  opacity:0.15;
  transition:opacity 400ms ease;
}
#ambient-canvas.hidden{opacity:0}

/* Cursor glow (lock screen only, activates on first mouse move) */
#cursor-glow{
  position:fixed;
  width:340px;
  height:340px;
  border-radius:50%;
  background:radial-gradient(circle, var(--accent-glow) 0%, transparent 65%);
  pointer-events:none;
  z-index:2;
  transform:translate(-50%,-50%);
  opacity:0;
  transition:opacity 400ms ease;
  mix-blend-mode:screen;
  filter:blur(8px);
}
#cursor-glow.active{opacity:0.5}

/* Reading progress bar */
#progress-bar{
  position:fixed;
  top:0;
  left:0;
  height:2px;
  width:0%;
  background:linear-gradient(90deg, var(--accent), transparent);
  z-index:100;
  transition:width 80ms linear;
  box-shadow:0 0 12px var(--accent-glow);
}

/* ============================================================
   PASSWORD SCREEN
   ============================================================ */
#password-screen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
  z-index:50;
  background:var(--bg);
}
#password-screen::before{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(circle at 50% 40%, rgba(167,139,250,0.04), transparent 60%);
  pointer-events:none;
}

#password-container{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  width:100%;
  max-width:340px;
  text-align:center;
  z-index:1;
}

/* Lock */
#lock-wrapper{
  position:relative;
  width:80px;
  height:96px;
  margin-bottom:36px;
  animation:lockPulse 3s ease-in-out infinite;
  will-change:filter,transform;
}
#lock-svg{width:100%;height:100%;display:block;overflow:visible}
#lock-shackle{
  stroke:#555;
  stroke-width:2.5;
  fill:none;
  stroke-linecap:round;
  transition:transform 420ms var(--ease-back), stroke 300ms ease;
  transform-origin:center;
}
#lock-body{
  fill:#1a1a1a;
  stroke:#555;
  stroke-width:1.5;
  rx:6;
  transition:stroke 300ms ease, filter 300ms ease;
}
#lock-keyhole{fill:#333;transition:fill 300ms ease}
#lock-flash{
  position:absolute;
  top:50%;left:50%;
  width:40px;height:40px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(251,191,36,0.6) 0%, rgba(251,191,36,0.2) 40%, transparent 70%);
  transform:translate(-50%,-50%) scale(0.3);
  opacity:0;
  pointer-events:none;
  z-index:2;
}
#lock-wrapper.shake{animation:lockShake 420ms ease-out}
#lock-wrapper.error-flash #lock-body{
  stroke:var(--error);
  filter:drop-shadow(0 0 14px rgba(248,113,113,0.5));
}
#lock-wrapper.error-flash #lock-keyhole{fill:#5a2424}

@keyframes lockPulse{
  0%,100%{filter:drop-shadow(0 0 6px rgba(167,139,250,0.08))}
  50%{filter:drop-shadow(0 0 14px rgba(167,139,250,0.18))}
}
@keyframes lockShake{
  0%,100%{transform:translateX(0)}
  15%{transform:translateX(-8px) rotate(-1deg)}
  30%{transform:translateX(8px) rotate(1deg)}
  45%{transform:translateX(-6px)}
  60%{transform:translateX(6px)}
  75%{transform:translateX(-3px)}
  90%{transform:translateX(3px)}
}
@keyframes clickFlash{
  0%{transform:translate(-50%,-50%) scale(0.3);opacity:0.9}
  100%{transform:translate(-50%,-50%) scale(3.5);opacity:0}
}
@keyframes lockGlow{
  0%{stroke:#555;filter:none}
  50%{stroke:#fbbf24;filter:drop-shadow(0 0 20px rgba(251,191,36,0.7))}
  100%{stroke:var(--accent);filter:drop-shadow(0 0 12px var(--accent-glow))}
}
@keyframes lockExit{
  0%{opacity:1;transform:scale(1.04)}
  100%{opacity:0;transform:scale(0.88)}
}
@keyframes screenFade{
  to{opacity:0;pointer-events:none;visibility:hidden}
}

/* Headings */
#password-container h1{
  font-size:clamp(26px,5vw,42px);
  color:var(--text);
  font-weight:700;
  letter-spacing:-0.02em;
  line-height:1.15;
}
#password-container .subtitle{
  font-size:13px;
  color:var(--muted);
  margin-top:8px;
  font-weight:400;
  letter-spacing:0.02em;
}

/* Input */
.input-wrap{
  position:relative;
  width:100%;
  max-width:280px;
  margin-top:32px;
}
input[type="password"],input[type="text"]#pwd{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:var(--radius-sm);
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-size:15px;
  letter-spacing:0.08em;
  padding:13px 48px 13px 18px;
  width:100%;
  outline:none;
  transition:border-color 200ms, box-shadow 200ms, background 200ms;
}
input#pwd:focus{
  border-color:rgba(167,139,250,0.5);
  box-shadow:0 0 0 3px rgba(167,139,250,0.1);
  background:rgba(255,255,255,0.06);
}
input#pwd::placeholder{color:#3a3a3a;letter-spacing:0.08em}

#toggle-pwd{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  background:transparent;
  border:none;
  color:var(--muted);
  padding:6px;
  border-radius:6px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:color 200ms, background 200ms;
}
#toggle-pwd:hover{color:var(--text);background:rgba(255,255,255,0.05)}
#toggle-pwd svg{width:16px;height:16px}

.caps-warning{
  font-size:11px;
  color:var(--lock-gold);
  margin-top:8px;
  opacity:0;
  transition:opacity 200ms;
  letter-spacing:0.04em;
}
.caps-warning.show{opacity:1}

/* Enter button */
#enter-btn{
  margin-top:14px;
  background:rgba(167,139,250,0.1);
  border:1px solid rgba(167,139,250,0.2);
  color:var(--accent);
  border-radius:8px;
  padding:11px 24px;
  font-family:'Inter',sans-serif;
  font-size:13px;
  font-weight:500;
  letter-spacing:0.04em;
  cursor:pointer;
  transition:background 150ms, transform 100ms, border-color 150ms;
}
#enter-btn:hover{background:rgba(167,139,250,0.18);border-color:rgba(167,139,250,0.35)}
#enter-btn:active{transform:scale(0.97)}

/* Error + hint */
#error-text{
  font-size:12px;
  color:var(--error);
  margin-top:14px;
  opacity:0;
  transition:opacity 200ms;
  letter-spacing:0.04em;
  font-weight:500;
  min-height:14px;
}
#hint-text{
  font-size:11px;
  color:var(--muted);
  margin-top:6px;
  opacity:0;
  transition:opacity 400ms;
  font-style:italic;
  letter-spacing:0.02em;
  max-width:280px;
  line-height:1.6;
  min-height:0;
}
#hint-text.show{opacity:1;min-height:14px}

/* Lock screen footer */
.lock-footer{
  position:absolute;
  bottom:24px;
  left:0;
  right:0;
  text-align:center;
  font-size:10px;
  color:var(--muted-3);
  letter-spacing:0.15em;
  text-transform:uppercase;
  opacity:0.6;
}

/* ============================================================
   MEMORY PAGE
   ============================================================ */
#memory-page{
  display:none;
  position:relative;
  z-index:2;
  padding:80px 24px 0;
  max-width:1200px;
  margin:0 auto;
  opacity:0;
}
@keyframes pageReveal{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

.page-header{margin-bottom:8px}
#greeting-line{
  font-size:13px;
  color:var(--accent);
  font-weight:500;
  letter-spacing:0.04em;
  margin-bottom:8px;
  opacity:0;
  animation:fadeUp 600ms var(--ease) 200ms forwards;
}
#person-name{
  font-size:clamp(28px,6vw,44px);
  color:var(--text);
  font-weight:700;
  letter-spacing:-0.02em;
  line-height:1.1;
}
#person-quote{
  font-family:'Inter',sans-serif;
  font-size:clamp(14px,2.2vw,16px);
  color:var(--text-soft);
  font-style:italic;
  font-weight:400;
  line-height:1.5;
  margin-top:14px;
  max-width:540px;
  letter-spacing:0.01em;
  opacity:0;
  animation:fadeUp 700ms var(--ease) 320ms forwards;
  position:relative;
  padding-left:14px;
}
#person-quote::before{
  content:'';
  position:absolute;
  left:0;
  top:4px;
  bottom:4px;
  width:2px;
  background:var(--accent);
  border-radius:2px;
  opacity:0.5;
}
#memory-count{
  font-size:13px;
  color:var(--muted);
  margin-top:6px;
  font-weight:400;
  letter-spacing:0.02em;
}

/* Controls */
.controls{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  align-items:center;
  margin-top:28px;
  opacity:0;
  animation:fadeUp 600ms var(--ease) 400ms forwards;
}
.search-wrap{
  position:relative;
  flex:1;
  min-width:200px;
  max-width:340px;
}
.search-wrap svg{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  width:14px;
  height:14px;
  color:var(--muted);
  pointer-events:none;
}
#search{
  width:100%;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  border-radius:99px;
  color:var(--text);
  font-size:13px;
  padding:10px 16px 10px 38px;
  outline:none;
  transition:border-color 200ms, box-shadow 200ms;
  letter-spacing:0.02em;
}
#search:focus{border-color:rgba(167,139,250,0.4);box-shadow:0 0 0 3px rgba(167,139,250,0.08)}
#search::placeholder{color:#3a3a3a}

#tag-filters{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  flex:1;
  justify-content:flex-end;
}
.tag-chip{
  background:transparent;
  border:1px solid var(--border);
  color:var(--muted);
  border-radius:99px;
  padding:6px 12px;
  font-size:11px;
  font-family:'Inter';
  letter-spacing:0.03em;
  cursor:pointer;
  transition:all 180ms ease;
}
.tag-chip:hover{color:var(--text);border-color:var(--border-hi)}
.tag-chip.active{
  background:var(--accent-dim);
  border-color:rgba(167,139,250,0.35);
  color:var(--accent);
}

.divider{
  border-top:1px solid rgba(255,255,255,0.05);
  margin:36px 0;
}

/* Grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
  gap:18px;
}
@media (max-width:640px){
  .grid{grid-template-columns:1fr}
}

/* Card */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:24px;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  transition:transform 280ms var(--ease), border-color 200ms ease, background 200ms ease, box-shadow 280ms ease;
  position:relative;
  cursor:pointer;
  opacity:0;
  transform:translateY(20px);
  overflow:hidden;
}
.card.revealed{
  animation:fadeUp 600ms var(--ease) forwards;
}
.card::before{
  content:'';
  position:absolute;
  top:0;left:0;
  width:100%;
  height:1px;
  background:linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity:0;
  transition:opacity 300ms ease;
}
.card:hover{
  transform:translateY(-4px);
  border-color:var(--border-hi);
  background:var(--surface-hi);
  box-shadow:0 12px 40px -12px rgba(0,0,0,0.6), 0 0 0 1px rgba(167,139,250,0.05);
}
.card:hover::before{opacity:0.6}

.card-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:14px;
}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{
  display:inline-block;
  background:var(--accent-dim);
  border:1px solid rgba(167,139,250,0.22);
  color:var(--accent);
  border-radius:99px;
  font-size:11px;
  font-family:'Inter';
  padding:3px 11px;
  letter-spacing:0.03em;
  font-weight:500;
}
.date{
  font-size:12px;
  color:var(--muted-2);
  font-family:'Inter';
  margin-left:auto;
  white-space:nowrap;
  flex-shrink:0;
  padding-top:2px;
}
.card-title{
  font-family:'Space Grotesk',sans-serif;
  font-weight:600;
  font-size:17px;
  color:var(--text);
  margin-top:0;
  line-height:1.3;
  letter-spacing:-0.01em;
}
.card-story{
  font-family:'Inter',sans-serif;
  font-weight:400;
  font-size:15px;
  color:var(--text-soft);
  line-height:1.8;
  margin-top:10px;
  display:-webkit-box;
  -webkit-line-clamp:4;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.card-footer{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:18px;
  padding-top:14px;
  border-top:1px solid rgba(255,255,255,0.04);
  opacity:0;
  transition:opacity 200ms ease;
}
.card:hover .card-footer{opacity:1}
.card-action{
  font-size:11px;
  color:var(--muted);
  letter-spacing:0.04em;
  cursor:pointer;
  transition:color 180ms;
  display:flex;
  align-items:center;
  gap:5px;
  background:none;
  border:none;
  padding:4px 0;
}
.card-action:hover{color:var(--text)}
.card-action svg{width:12px;height:12px}

.react-btn{
  display:flex;
  align-items:center;
  gap:5px;
  background:none;
  border:none;
  color:var(--muted);
  font-size:11px;
  cursor:pointer;
  padding:4px 8px;
  border-radius:99px;
  transition:all 180ms;
  letter-spacing:0.04em;
}
.react-btn:hover{color:var(--accent);background:var(--accent-dim)}
.react-btn.active{color:var(--accent)}
.react-btn.active svg{fill:var(--accent);stroke:var(--accent)}
.react-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.5;transition:all 180ms}

/* Empty state */
.empty-state{
  grid-column:1/-1;
  text-align:center;
  padding:64px 24px;
  color:var(--muted);
  font-size:13px;
  letter-spacing:0.04em;
}

/* Footer */
footer{
  text-align:center;
  font-size:12px;
  color:var(--muted-3);
  padding:64px 0 48px;
  font-family:'Inter';
  letter-spacing:0.04em;
}
.footer-meta{
  margin-top:8px;
  font-size:10px;
  color:var(--muted-3);
  opacity:0.5;
  letter-spacing:0.1em;
  text-transform:uppercase;
}

/* ============================================================
   MEMORY MODAL
   ============================================================ */
#memory-modal{
  position:fixed;
  inset:0;
  background:rgba(8,8,8,0.85);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  z-index:200;
  display:none;
  align-items:center;
  justify-content:center;
  padding:24px;
  opacity:0;
  transition:opacity 300ms ease;
}
#memory-modal.open{display:flex;opacity:1}
#modal-content{
  background:rgba(20,20,20,0.95);
  border:1px solid var(--border-hi);
  border-radius:20px;
  padding:36px;
  max-width:580px;
  width:100%;
  max-height:85vh;
  overflow-y:auto;
  position:relative;
  transform:translateY(20px) scale(0.96);
  transition:transform 400ms var(--ease-back);
}
#memory-modal.open #modal-content{transform:translateY(0) scale(1)}
#modal-close{
  position:absolute;
  top:18px;
  right:18px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  color:var(--muted);
  width:32px;
  height:32px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:all 180ms;
}
#modal-close:hover{color:var(--text);background:rgba(255,255,255,0.1)}
#modal-close svg{width:14px;height:14px}
.modal-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.modal-date{font-size:12px;color:var(--muted);margin-bottom:8px;letter-spacing:0.04em}
.modal-title{
  font-family:'Space Grotesk';
  font-weight:700;
  font-size:clamp(22px,4vw,28px);
  color:var(--text);
  line-height:1.25;
  letter-spacing:-0.02em;
  margin-bottom:18px;
}
.modal-story{
  font-family:'Inter';
  font-size:15px;
  color:var(--text-soft);
  line-height:1.85;
  white-space:pre-wrap;
}
.modal-footer{
  margin-top:28px;
  padding-top:20px;
  border-top:1px solid rgba(255,255,255,0.05);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}

/* Toast */

/* ================================================================

function playTone(freq, dur=0.12, type='sine', vol=0.08, when=0){
  const ctx = getAudio();
  if (!ctx) return;
  const t = ctx.currentTime + when;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol, t + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(gain).connect(ctx.destination);
  osc.start(t);
  osc.stop(t + dur + 0.02);
}

/* ================================================================
   AMBIENT PARTICLES — lock screen only, paused after unlock
   ================================================================ */
function initParticles(){
  const canvas = ambientCanvas;
  const ctx = canvas.getContext('2d');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduceMotion) return;

  let w, h, particles = [];
  const COUNT = window.innerWidth < 640 ? 16 : 30;

  function resize(){
    w = canvas.width = window.innerWidth * devicePixelRatio;
    h = canvas.height = window.innerHeight * devicePixelRatio;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
  }
  function spawn(){
    particles = [];
    for (let i=0; i<COUNT; i++){
      particles.push({
        x: Math.random()*w,
        y: Math.random()*h,
        r: (Math.random()*1.2 + 0.3) * devicePixelRatio,
        vx: (Math.random()-0.5) * 0.08 * devicePixelRatio,
        vy: (Math.random()-0.5) * 0.08 * devicePixelRatio,
        a: Math.random()*0.35 + 0.08,
        phase: Math.random()*Math.PI*2
      });
    }
  }
  function tick(t){
    if (particlePaused){
      particleRAF = null;
      return;
    }
    ctx.clearRect(0,0,w,h);
    const accent = getComputedStyle(document.body).getPropertyValue('--accent').trim() || '#a78bfa';
    const rgb = hexToRgb(accent);
    for (const p of particles){
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < -10) p.x = w + 10;
      if (p.x > w + 10) p.x = -10;
      if (p.y < -10) p.y = h + 10;
      if (p.y > h + 10) p.y = -10;
      const flicker = (Math.sin(t*0.001 + p.phase) * 0.3 + 0.7);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${p.a * flicker})`;
      ctx.fill();
    }
    particleRAF = requestAnimationFrame(tick);
  }
  function hexToRgb(hex){
    hex = hex.replace('#','');
    if (hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
    const n = parseInt(hex, 16);
    return { r:(n>>16)&255, g:(n>>8)&255, b:n&255 };
  }
  resize(); spawn();
  window.addEventListener('resize', () => { resize(); spawn(); });
  particleRAF = requestAnimationFrame(tick);
}
function stopParticles(){
  particlePaused = true;
  if (particleRAF){
    cancelAnimationFrame(particleRAF);
    particleRAF = null;
  }
  ambientCanvas.classList.add('hidden');
  setTimeout(() => { ambientCanvas.style.display = 'none'; }, 450);
}

}

  lockShackle.style.transform = 'translateY(-17px)';

  // Phase 2 — click flash at 350ms
  setTimeout(() => {
    lockFlash.style.animation = 'clickFlash 350ms ease-out forwards';
  }, 350);

  // Phase 3 — body glow at 400ms
  setTimeout(() => {
    lockBody.style.animation = 'lockGlow 300ms ease-out forwards';
  }, 400);

  // Phase 4 — lock exits at 650ms
  setTimeout(() => {
    lockWrapper.style.animation = 'lockExit 300ms ease-in forwards';
  }, 650);

  // Phase 5 — screen fades at 900ms, then fully removed from DOM
  setTimeout(() => {
    passwordScreen.style.animation = 'screenFade 200ms ease-out forwards';
  }, 900);
  setTimeout(() => {
    passwordScreen.style.display = 'none';
  }, 1120);

  // Phase 6 — build and show memory page at 1050ms
  setTimeout(() => {
    buildMemoryPage(person);
    memoryPage.style.display = 'block';
    memoryPage.setAttribute('aria-hidden', 'false');
    passwordScreen.setAttribute('aria-hidden', 'true');
    memoryPage.style.animation = 'pageReveal 500ms ease-out forwards';
    // Stop ambient particles — they belong only to the lock screen
    stopParticles();
    // Initial scroll
    window.scrollTo(0, 0);
  }, 1050);
}

function triggerWrongAnimation(customMsg){
  State.wrongAttempts++;

  // Capture the attempted value BEFORE clearing the input
  const attemptedValue = pwdInput.value;

  // Reset animation
  lockWrapper.classList.remove('shake', 'error-flash');
  void lockWrapper.offsetWidth; // reflow
  lockWrapper.classList.add('shake', 'error-flash');

  // Error text
  errorText.textContent = customMsg || 'wrong key.';
  errorText.style.opacity = '1';
  pwdInput.value = '';

  // Sound
  playErrorSound();

  // Clear error after 2s
  clearTimeout(triggerWrongAnimation._t);
  triggerWrongAnimation._t = setTimeout(() => { errorText.style.opacity = '0'; }, 2000);
  setTimeout(() => {
    lockWrapper.classList.remove('shake', 'error-flash');
  }, 450);

  // Hint system — after 3 wrong attempts, surface a soft prompt
  if (State.wrongAttempts >= 3 && !hintText.dataset.shown){
    hintText.textContent = 'hint: keys are simple. usually a name and a word.';
    hintText.classList.add('show');
    hintText.dataset.shown = '1';
  }
  // After 5 wrong attempts, surface a stronger nudge — using the captured value
  if (State.wrongAttempts >= 5){
    const lower = attemptedValue.toLowerCase();
    // Don't reveal which person — just a generic second hint
    if (lower.trim().length > 0){
      hintText.textContent = "the password isn't your name. it's something only we'd know.";
    } else {
      hintText.textContent = "the password isn't your name. it's something only we'd know.";
    }
    hintText.classList.add('show');
  }
}


/* ================================================================
   BUILD MEMORY PAGE
   ================================================================ */
function buildMemoryPage(person){
  // Greeting line (time-aware)
  greetingLine.textContent = getTimeGreeting(person.name);

  // Person name
  personName.textContent = `memories with ${person.name}.`;

  // Personal quote / tagline
  personQuote.textContent = person.quote || '';

  // Animated count up
  animateCount(person.memories.length);

  // Build tag filter chips
  buildTagFilters(person);

  // Build cards
  renderCards(person);

  // Footer meta
  const now = new Date();
  const stamp = now.toLocaleDateString('en-US', { month:'short', year:'numeric' });
  footerMeta.textContent = `opened ${stamp} · private`;
}

function animateCount(target){
  const dur = 900;
  const start = performance.now();
  function step(t){
    const p = Math.min(1, (t - start) / dur);
    const eased = 1 - Math.pow(1 - p, 3);
    const val = Math.round(eased * target);
    memoryCount.textContent = `${val} memor${val===1?'y':'ies'} stored here.`;
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function buildTagFilters(person){
  const tags = new Set();
  person.memories.forEach(m => m.tags.forEach(t => tags.add(t)));
  tagFilters.innerHTML = '';
  tags.forEach(t => {
    const chip = document.createElement('button');
    chip.className = 'tag-chip';
    chip.textContent = `#${t}`;
    chip.dataset.tag = t;
    chip.addEventListener('click', () => {
      if (State.activeTag === t){
        State.activeTag = null;
        chip.classList.remove('active');
      } else {
        State.activeTag = t;
        tagFilters.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
      }
      renderCards(State.currentPerson);
    });
    tagFilters.appendChild(chip);
  });
}

function renderCards(person){
  memoryGrid.innerHTML = '';
  const q = State.searchQuery.toLowerCase();
  const filtered = person.memories.filter(m => {
    const matchesTag = !State.activeTag || m.tags.includes(State.activeTag);
    const matchesSearch = !q ||
      m.title.toLowerCase().includes(q) ||
      m.story.toLowerCase().includes(q) ||
      m.tags.some(t => t.toLowerCase().includes(q));
    return matchesTag && matchesSearch;
  });

  if (filtered.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'no memories match. try a different search.';
    memoryGrid.appendChild(empty);
    return;
  }

  filtered.forEach((m) => {
    const originalIdx = person.memories.indexOf(m);
    const id = memoryId(person, originalIdx);
    const card = document.createElement('article');
    card.className = 'card';
    card.setAttribute('role', 'listitem');
    card.dataset.id = id;
    const reacted = State.reactions[id] ? 1 : 0;
    card.innerHTML = `
      <div class="card-top">
        <div class="tags">${m.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
        <span class="date">${escapeHtml(m.date)}</span>
      </div>
      <div class="card-title">${escapeHtml(m.title)}</div>
      <div class="card-story">${escapeHtml(m.story)}</div>
      <div class="card-footer">
        <button class="card-action copy-btn" aria-label="Copy memory">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          copy
        </button>
        <button class="react-btn ${reacted ? 'active' : ''}" aria-label="Star this memory">
          <svg viewBox="0 0 24 24">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
          <span class="react-count">${reacted}</span>
        </button>
      </div>
    `;
    // Open modal on card click (but not on buttons)
    card.addEventListener('click', (e) => {
      if (e.target.closest('button')) return;
      openModal(m, id);
    });
    // Copy
    card.querySelector('.copy-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      copyMemory(m);
    });
    // React
    const reactBtn = card.querySelector('.react-btn');
    reactBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleReaction(id, reactBtn);
    });

    memoryGrid.appendChild(card);

    // Stagger reveal
    setTimeout(() => card.classList.add('revealed'), 60 * (filtered.indexOf(m) + 1));
  });
}


/* ================================================================
   MEMORY MODAL
   ================================================================ */
function openModal(m, id){
  modalTags.innerHTML = m.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
  modalDate.textContent = m.date;
  modalTitle.textContent = m.title;
  modalStory.textContent = m.story;
  modalReactCount.textContent = State.reactions[id] ? 1 : 0;
  modalReact.classList.toggle('active', !!State.reactions[id]);
  modalReact.dataset.id = id;
  memoryModal.classList.add('open');
  document.body.style.overflow = 'hidden';
  modalClose.focus();
}
function closeModal(){
  memoryModal.classList.remove('open');
  document.body.style.overflow = '';
}
function toggleReaction(id, btn){
  const active = !!State.reactions[id];
  if (active){
    delete State.reactions[id];
  } else {
    State.reactions[id] = 1;
    playClickSound();
  }
  saveReactions();
  if (btn){
    btn.classList.toggle('active', !active);
    btn.querySelector('.react-count').textContent = !active ? 1 : 0;
  } else {
    modalReact.classList.toggle('active', !active);
    modalReactCount.textContent = !active ? 1 : 0;
  }
  showToast(!active ? 'starred.' : 'unstarred.', 1200);
}
function copyMemory(m){
  const text = `${m.title}\n\n${m.story}\n\n— ${m.date}`;
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(
      () => showToast('copied to clipboard.'),
      () => showToast('copy failed.')
    );
  } else {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); showToast('copied to clipboard.'); }
    catch(e){ showToast('copy failed.'); }
    document.body.removeChild(ta);
  }
}


/* ================================================================
   EVENT WIRING
   ================================================================ */
function wireEvents(){
  // Enter button + Enter key
  enterBtn.addEventListener('click', tryUnlock);
  pwdInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') tryUnlock();
  });

  // Password visibility toggle
  togglePwd.addEventListener('click', () => {
    const isPwd = pwdInput.type === 'password';
    pwdInput.type = isPwd ? 'text' : 'password';
    togglePwd.setAttribute('aria-label', isPwd ? 'Hide password' : 'Show password');
    togglePwd.style.color = isPwd ? 'var(--accent)' : '';
    pwdInput.focus();
  });

  // Caps lock detection
  pwdInput.addEventListener('keydown', (e) => {
    if (e.getModifierState && e.getModifierState('CapsLock')){
      capsWarning.classList.add('show');
    } else {
      capsWarning.classList.remove('show');
    }
  });
  pwdInput.addEventListener('keyup', (e) => {
    if (e.getModifierState && !e.getModifierState('CapsLock')){
      capsWarning.classList.remove('show');
    }
  });
  pwdInput.addEventListener('blur', () => capsWarning.classList.remove('show'));

  // Auto-focus password on load
  setTimeout(() => pwdInput.focus(), 100);

  // Search
  let searchTimer;
  searchInput.addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      State.searchQuery = e.target.value;
      if (State.currentPerson) renderCards(State.currentPerson);
    }, 120);
  });

  // Modal close
  modalClose.addEventListener('click', closeModal);
  memoryModal.addEventListener('click', (e) => {
    if (e.target === memoryModal) closeModal();
  });
  modalCopy.addEventListener('click', () => {
    const id = modalReact.dataset.id;
    const m = State.currentPerson.memories.find((_,i) => memoryId(State.currentPerson,i) === id);
    if (m) copyMemory(m);
  });
  modalReact.addEventListener('click', () => {
    const id = modalReact.dataset.id;
    toggleReaction(id, null);
  });

  // Reading progress
  window.addEventListener('scroll', () => {
    const h = document.documentElement;
    const max = h.scrollHeight - h.clientHeight;
    const pct = max > 0 ? (h.scrollTop / max) * 100 : 0;
    progressBar.style.width = pct + '%';
  }, { passive: true });

  // Keyboard shortcuts (global)
  document.addEventListener('keydown', (e) => {
    // Escape closes modal
    if (e.key === 'Escape' && memoryModal.classList.contains('open')){
      closeModal();
      return;
    }
    // "/" focuses search (when on memory page)
    if (e.key === '/' && memoryPage.style.display === 'block' && document.activeElement !== searchInput){
      e.preventDefault();
      searchInput.focus();
    }
  });

  // Tab blur — privacy: blur content so passers-by / screen-recorders see nothing
  document.addEventListener('visibilitychange', () => {
    if (document.hidden){
      document.body.classList.add('tab-blurred');
    } else {
      document.body.classList.remove('tab-blurred');
    }
  });
  window.addEventListener('blur', () => document.body.classList.add('tab-blurred'));
  window.addEventListener('focus', () => document.body.classList.remove('tab-blurred'));

  // Tag chips clickable as filter (already wired in buildTagFilters)
}

/* ================================================================
   INIT
   ================================================================ */
function init(){
  wireEvents();
  initParticles();
  initCursorGlow();

  // Prevent right-click on password screen for mild casual obfuscation
  // (comment out if you want dev tools / view-source easy)
  // passwordScreen.addEventListener('contextmenu', e => e.preventDefault());

  // Prevent form autofill from leaking
  pwdInput.setAttribute('autocomplete', 'off');
}

if (document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
